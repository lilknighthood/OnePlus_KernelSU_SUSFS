name: Build and Release OnePlus Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Do you want to create a release?'
        required: true
        type: boolean
        default: false
      ksun_branch:
        description: "Choose KernelSU Next Branch"
        required: true
        type: choice
        options:
          - stable
          - next
        default: next
      android14-6_1_susfs_branch:
        description: "Choose SusFS Branch for android14-6.1"
        type: string
        default: "gki-android14-6.1"
      android15-6_6_susfs_branch:
        description: "Choose SusFS Branch for android15-6.6"
        type: string
        default: "gki-android15-6.6"
      enable_power_savings:
        description: "Enable power saving optimizations (reduces performance by ~50%)"
        required: true
        type: boolean
        default: true

jobs:
  build-ace5-13r:
    name: build-ace5-13r (${{ matrix.model }}, ${{ matrix.soc }}, ${{ matrix.branch }}, ${{ matrix.manifest }}, ${{ matrix.android_version }}, ${{ matrix.kernel_version }}, ${{ inputs.ksun_branch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: OP13r
            soc: pineapple
            branch: oneplus/sm8650
            manifest: oneplus_13r.xml
            android_version: android14
            kernel_version: "6.1"
          - model: OP-ACE-5
            soc: pineapple
            branch: oneplus/sm8650
            manifest: oneplus_ace5.xml
            android_version: android14
            kernel_version: "6.1"
    runs-on: ubuntu-latest
    steps:
      - name: Select Appropriate SusFS Branch
        id: get-susfs-branch
        run: |
          KERNEL_STRING="${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          case "$KERNEL_STRING" in
            "android14-6.1")
              SUSFS_BRANCH="${{ inputs.android14-6_1_susfs_branch }}"
              ;;
            "android15-6.6")
              SUSFS_BRANCH="${{ inputs.android15-6_6_susfs_branch }}"
              ;;
            *)
              echo "Invalid kernel version or unsupported: $KERNEL_STRING"
              exit 1
              ;;
          esac
          
          if [[ -z "$SUSFS_BRANCH" ]]; then
            SUSFS_BRANCH="gki-${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          fi
          
          echo "susfs_branch=$SUSFS_BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Apply Power Saving Optimizations
        if: ${{ inputs.enable_power_savings }}
        run: |
          echo "Applying power saving kernel configurations..."
          
          # Create power saving config overlay
          cat << 'EOF' > power_saving_config.txt
          # CPU Frequency Scaling - Reduce max frequencies by ~50%
          CONFIG_CPU_FREQ_DEFAULT_GOV_CONSERVATIVE=y
          CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y
          CONFIG_CPU_FREQ_GOV_POWERSAVE=y
          # CONFIG_CPU_FREQ_GOV_PERFORMANCE is not set
          # CONFIG_CPU_FREQ_GOV_ONDEMAND is not set
          
          # CPU Boost Disable
          # CONFIG_CPU_BOOST is not set
          # CONFIG_DYNAMIC_STUNE_BOOST is not set
          
          # Thermal Throttling - More aggressive
          CONFIG_THERMAL_GOV_STEP_WISE=y
          CONFIG_THERMAL_GOV_LOW_LIMITS=y
          CONFIG_THERMAL_EMERGENCY_POWEROFF_DELAY_MS=1000
          
          # Power Management
          CONFIG_PM_SLEEP=y
          CONFIG_PM_AUTOSLEEP=y
          CONFIG_PM_WAKELOCKS=y
          CONFIG_PM_WAKELOCKS_LIMIT=100
          CONFIG_PM_WAKELOCKS_GC=y
          CONFIG_PM_ADVANCED_DEBUG=y
          CONFIG_SUSPEND_FREEZER=y
          
          # CPU Idle - More aggressive sleep states
          CONFIG_CPU_IDLE=y
          CONFIG_CPU_IDLE_GOV_LADDER=y
          CONFIG_CPU_IDLE_GOV_MENU=y
          CONFIG_CPU_IDLE_MULTIPLE_DRIVERS=y
          
          # Voltage Scaling - Reduce voltages
          CONFIG_REGULATOR_CPR3_HMSS=y
          CONFIG_REGULATOR_CPR3_MMSS=y
          
          # Scheduler - Power efficient
          CONFIG_SCHED_MC=y
          CONFIG_SCHED_SMT=y
          CONFIG_SCHED_AUTOGROUP=y
          CONFIG_CFS_BANDWIDTH=y
          
          # I/O Scheduler - Power efficient
          CONFIG_IOSCHED_BFQ=y
          CONFIG_BFQ_GROUP_IOSCHED=y
          CONFIG_DEFAULT_BFQ=y
          CONFIG_DEFAULT_IOSCHED="bfq"
          
          # Memory Management - Reduce performance for power
          CONFIG_ZSMALLOC=y
          CONFIG_PGTABLE_MAPPING=y
          CONFIG_ZRAM_WRITEBACK=y
          CONFIG_ZRAM_MEMORY_TRACKING=y
          
          # Network Power Saving
          CONFIG_WIRELESS_EXT=y
          CONFIG_CFG80211_WEXT=y
          CONFIG_MAC80211_RC_DEFAULT_PID=y
          
          # GPU Power Saving
          CONFIG_DRM_MSM_GPU_SUDO=y
          
          # Reduce Timer Frequency for Power Saving
          CONFIG_HZ_100=y
          # CONFIG_HZ_250 is not set
          # CONFIG_HZ_300 is not set
          # CONFIG_HZ_1000 is not set
          CONFIG_HZ=100
          
          # Disable High Performance Features
          # CONFIG_SMP_ON_UP is not set
          # CONFIG_ARM_LPAE is not set
          
          # Conservative Memory Settings
          CONFIG_COMPACTION=y
          CONFIG_MIGRATION=y
          CONFIG_KSM=y
          CONFIG_DEFAULT_MMAP_MIN_ADDR=32768
          
          # Power Efficient Workqueue
          CONFIG_WQ_POWER_EFFICIENT_DEFAULT=y
          
          # Reduce Kernel Log Level (less CPU usage)
          CONFIG_DYNAMIC_DEBUG=n
          CONFIG_PRINTK_TIME=n
          
          EOF
          
          echo "Power saving configuration created."

      - name: Build Kernel
        uses: ./.github/actions
        with:
          model: ${{ matrix.model }}
          soc: ${{ matrix.soc }}
          branch: ${{ matrix.branch }}
          manifest: ${{ matrix.manifest }}
          android_version: ${{ matrix.android_version }}
          kernel_version: ${{ matrix.kernel_version }}
          ksun_branch: ${{ inputs.ksun_branch }}
          susfs_branch: ${{ steps.get-susfs-branch.outputs.susfs_branch }}
          power_saving_config: ${{ inputs.enable_power_savings && 'power_saving_config.txt' || '' }}

  trigger-release:
    needs: build-ace5-13r
    runs-on: ubuntu-latest
    if: ${{ inputs.make_release }}
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME: "*TEST BUILD* OnePlus Kernels With KernelSU Next & SUSFS v1.5.7 + Power Saving *TEST BUILD*"
      RELEASE_NOTES: |
        This release contains KernelSU Next and SUSFS v1.5.7 with Power Saving Optimizations
        
        Module: 
        -> https://github.com/sidex15/ksu_module_susfs

        Non-Official Managers:
        -> https://github.com/KernelSU-Next/KernelSU-Next

        Features:
        [+] KernelSU-Next
        [+] SUSFS v1.5.7
        [+] Wireguard Support
        [+] Maphide LineageOS Detections
        [+] Futile Maphide for jit-zygote-cache Detections
        [+] Magic Mount Support
        [+] Ptrace message leak fix for kernels < 5.16
        [+] CMD_SUSFS_HIDE_SUS_MNTS_FOR_ALL_PROCS Support for all kernels.
        [+] Manual Hooks [scope_min_manual_hooks_v1.4]
        [+] CONFIG_TMPFS_XATTR Support [Mountify Support]
        [+] BBR v1 Support.
        
        Power Saving Features (when enabled):
        [+] Conservative CPU Governor (reduces performance ~50%)
        [+] Aggressive thermal throttling
        [+] Enhanced power management
        [+] BFQ I/O scheduler for better battery life
        [+] Reduced timer frequency (100Hz)
        [+] Power efficient workqueue
        [+] Memory compression optimizations
        [+] GPU power saving modes
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate and Create New Tag
        run: |
          BASE_TAG="v1.5.7-r0"
          LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name')
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="$BASE_TAG"
          else
            LATEST_TAG=$(printf "%s\n%s\n" "$LATEST_TAG" "$BASE_TAG" | sort -rV | head -n1)
          fi
          NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')
          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          prerelease: true
          release_name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets Dynamically
        run: |
          for file in ./downloaded-artifacts/kernel-*/*; do
              if [ -d "$file" ]; then
                  continue
              fi
              echo "Uploading $file..."
              gh release upload ${{ env.NEW_TAG }} "$file"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ env.NEW_TAG }}

      - name: Display Files Uploaded
        run: |
          echo "GitHub release created with the following files:"
          ls ./downloaded-artifacts/**/*
